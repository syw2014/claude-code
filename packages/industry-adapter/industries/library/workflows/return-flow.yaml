name: return-flow
description: 图书馆还书全流程
industry: library
steps:
  - id: query_reader_step
    tool: query_reader
    params:
      readerId: "{{readerId}}"
    onError: abort
  - id: return_step
    tool: return_book
    params:
      bookId: "{{bookId}}"
      readerId: "{{readerId}}"
    onError: abort
  - id: check_fees_step
    tool: query_reader
    params:
      readerId: "{{readerId}}"
    onError: continue
